<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>{{ obj.name }}</title>
    <link rel="stylesheet" href="/static/small-screen.css">
</head>
<body class="small-screen bg-gray-50">

<header class="page-pad bg-white border-b border-gray-200">
    <a href="/" style="font-size:var(--text-sm);color:#6b7280;text-decoration:none">← Список</a>
    <h1 class="title-section" style="margin-top:6px">{{ obj.name }}</h1>
</header>

<div class="page-pad" style="display:flex;flex-direction:column;gap:8px">
    <div class="card page-pad">
        <img src="{{ obj.image_url }}" alt="" style="width:100%;max-height:200px;object-fit:contain;border-radius:8px;background:#f3f4f6">
    </div>
    <div class="card page-pad" style="font-size:var(--text-base)">
        <p style="margin:0 0 8px">{{ obj.description }}</p>
        <p style="margin:0;font-size:var(--text-lg)"><b>{{ obj.category }}</b> · {{ obj.confidence }}%</p>
        <p style="margin:8px 0 0;color:#6b7280;font-size:var(--text-sm)">{{ obj.date }}</p>
        {% if obj.features %}
        <ul style="margin:10px 0 0;padding-left:18px;font-size:var(--text-sm)">
            {% for feature in obj.features %}
            <li>{{ feature }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>
</div>

</body>
</html>
