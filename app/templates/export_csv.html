<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Экспорт CSV</title>
    <link rel="stylesheet" href="/static/small-screen.css">
    <link rel="stylesheet" href="/static/home.css">
</head>
<body class="small-screen export-page">

<header class="ui-header ui-header--back">
    <a href="/" class="ui-back" aria-label="Назад">‹</a>
    <h1>Экспорт CSV</h1>
</header>

<main class="export-main">
    <div class="export-range-row">
        <div class="export-range-field">
            <label for="display_from">С</label>
            <div class="export-range-wrap">
                <input type="text" id="display_from" class="export-range-display" readonly>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
            </div>
        </div>
        <div class="export-range-field">
            <label for="display_to">По</label>
            <div class="export-range-wrap">
                <input type="text" id="display_to" class="export-range-display" readonly>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="calendars-panel">
        <div class="calendars-row" id="calendars-row"></div>
    </div>

    <div class="export-summary" id="export-summary">Выберите период</div>
    <button type="button" id="clear-range" class="export-clear-btn">Сбросить период (все объекты)</button>
</main>

<form
    class="export-footer"
    id="export-form"
    action="/export/csv"
    method="GET"
    data-show-loader
    data-loader-message="Подготовка выгрузки…"
>
    <input type="hidden" name="date_from" id="date_from">
    <input type="hidden" name="date_to" id="date_to">
    <button type="submit" class="ui-btn-download">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 21h16"/>
        </svg>
        СКАЧАТЬ CSV
    </button>
</form>

<div id="app-loader" class="loader-overlay" hidden>
    <div class="loader-spinner" aria-hidden="true"></div>
    <p class="loader-text">Подготовка выгрузки…</p>
</div>

<script>
    window.EXPORT_BOUNDS = {
        min: {{ export_min_date|tojson }},
        max: {{ export_max_date|tojson }}
    };
</script>
<script src="/static/export.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
